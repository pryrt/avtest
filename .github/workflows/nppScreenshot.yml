name: 🦎🗊 Notepad++ Screenshot 📸

# controls when the action will run
on: [push, workflow_dispatch]

jobs:
  nppScreenshot:
    name: 🦎🗊 Notepad++ Screenshot 📸
    runs-on: windows-latest
    steps:
    - name: 🦎🗊 Install Notepad++
      uses: crazy-max/ghaction-chocolatey@v3
      with:
        args: install -y notepadplusplus

    - name: 🦎🗊 Prepare Notepad++
      run: |
        $NppDir = "C:\Program Files\Notepad++"
        $ThemeSource = "$NppDir\Themes\Bespin.xml"
        $ThemeDest = "$env:APPDATA\Notepad++\stylers.xml"
        Copy-Item "$ThemeSource" -Destination "$ThemeDest" -Force
  
    #    - name: 📸 Take Screenshot
    #      uses: OrbitalOwen/desktop-screenshot-action@0.1
    #      with:
    #        file-name: 'desktop.jpg'

    - name: 📸 Take Desktop Screenshot
      shell: powershell
      run: |
        & "C:\Program Files\Notepad++\notepad++.exe" -qSpeed1 -qt="one two three four five six seven eight nine ten one two three four five six seven eight nine ten one two three four five six seven eight nine ten one two three four five six seven eight nine ten one two three four five six seven eight nine ten one two three four five six seven eight nine ten one two three four five six seven eight nine ten one two three four five six seven eight nine ten one two three four five six seven eight nine ten one two three four five six seven eight nine ten one two three four five six seven eight nine ten one two three four five six seven eight nine ten"
        #
        # wait 5 seconds for N++ to launch and start typing
        Start-Sleep -Seconds 5
        #
        Add-Type -AssemblyName System.Windows.Forms
        Add-Type -AssemblyName System.Drawing
        $Screen = [System.Windows.Forms.Screen]::PrimaryScreen
        $Bitmap = New-Object System.Drawing.Bitmap($Screen.Bounds.Width, $Screen.Bounds.Height)
        $Graphics = [System.Drawing.Graphics]::FromImage($Bitmap)
        $Graphics.CopyFromScreen($Screen.Bounds.X, $Screen.Bounds.Y, 0, 0, $Screen.Bounds.Size)
        $Bitmap.Save("$PWD/screenshot1.png", [System.Drawing.Imaging.ImageFormat]::Png)
        $Graphics.Dispose()
        $Bitmap.Dispose()

    - name: 📸 Take Second Screenshot
      shell: powershell
      run: |
        "#!/usr/bin/perl" >> blah.pl
        "print qq(Hello World\n);" >> blah.pl
        "sub doesNothing { return 0; }" >> blah.pl
        #
        & "C:\Program Files\Notepad++\notepad++.exe" blah.pl
        #
        # wait 5 seconds to make sure file is loaded
        Start-Sleep -Seconds 5
        #
        Add-Type -AssemblyName System.Windows.Forms
        Add-Type -AssemblyName System.Drawing
        $Screen = [System.Windows.Forms.Screen]::PrimaryScreen
        $Bitmap = New-Object System.Drawing.Bitmap($Screen.Bounds.Width, $Screen.Bounds.Height)
        $Graphics = [System.Drawing.Graphics]::FromImage($Bitmap)
        $Graphics.CopyFromScreen($Screen.Bounds.X, $Screen.Bounds.Y, 0, 0, $Screen.Bounds.Size)
        $Bitmap.Save("$PWD/screenshot2.png", [System.Drawing.Imaging.ImageFormat]::Png)
        $Graphics.Dispose()
        $Bitmap.Dispose()

    - name: 🎉 Store screenshot as artifact
      uses: actions/upload-artifact@v6
      with:
          name: nppScreenshot
          path: ./screenshot*.png

# Cool.  I've got this one to the point where I can do screenshots of a theme of my choice
